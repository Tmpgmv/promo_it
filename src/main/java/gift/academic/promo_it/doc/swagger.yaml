openapi: 3.0.3
info:
  title: OTP Service API
  version: 3.0.3
  description: API для генерации OTP-кодов и управления настройками OTP.
servers:
  - url: https://api.example.com
    description: Продакшн

paths:
  /otp/settings:
    get:
      tags:
        - OTPSettings
      summary: Получить текущие настройки OTP
      description: Возвращает текущие параметры конфигурации OTP
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSettings'
        '401':
          description: Неавторизованный доступ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    put:
      tags:
        - OTPSettings
      summary: Обновить настройки OTP
      description: Обновляет конфигурацию OTP (lifespan, numberOfSymbols и т.д.)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpConfigUpdateRequest'
      responses:
        '200':
          description: Настройки успешно обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSettings'
        '400':
          description: Неверный формат или значения полей тела запроса
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Неавторизованный доступ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /otp/generate:
    post:
      tags:
        - OTPSettings
      summary: Сгенерировать OTP код
      description: Генерирует и отправляет код согласно текущим настройкам. Доступно только авторизованным пользователям.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpGenerateRequest'
      responses:
        '202':
          description: Запрос принят к обработке
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpGenerateResponse'
        '400':
          description: Ошибка валидации тела запроса
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Не авторизован
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    OtpConfigUpdateRequest:
      type: object
      required:
        - lifespan
        - numberOfSymbols
      properties:
        lifespan:
          type: string
          description: ISO-8601 продолжительность (например, PT15M)
          example: "PT15M"
        numberOfSymbols:
          type: integer
          minimum: 4
          description: Количество знаков в OTP
          example: 6

    OtpConfigResponse:
      type: object
      properties:
        lifespan:
          type: string
          description: ISO-8601 продолжительность
          example: "PT15M"
        numberOfSymbols:
          type: integer
          description: Количество знаков в OTP
          example: 6

    OtpSettings:
      type: object
      properties:
        enabled:
          type: boolean
        config:
          $ref: '#/components/schemas/OtpConfigResponse'

    OtpGenerateRequest:
      type: object
      required:
        - operationId
        - media
      properties:
        operationId:
          type: string
          description: Уникальный номер операции
          example: "OP-12345"
        media:
          type: string
          description: Способ получения кода
          enum:
            - sms
            - email
            - push
          example: "sms"

    OtpGenerateResponse:
      type: object
      required:
        - code
        - media
      properties:
        code:
          type: integer
          description: Сгенерированный OTP код
          example: 6087
        media:
          type: string
          description: Способ доставки кода
          example: "sms"

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          description: Тип URI-совместимой ошибки
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string