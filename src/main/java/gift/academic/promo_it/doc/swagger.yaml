openapi: 3.0.3
info:
  title: Promo-IT Backend
  description: "Spring Boot API для Promo-IT: регистрация пользователей с уникальным ADMIN и JWT аутентификация."
  version: 1.0.0
  contact:
    name: Promo-IT Team
servers:
  - url: http://localhost:8080
    description: Development server
tags:
  - name: Authentication
    description: Операции регистрации и входа
  - name: OTPSettings
    description: Конфигурация OTP. Доступно только пользователям с ролью ADMIN.

paths:
  /settings:
    get:
      x-role-required: ADMIN
      tags:
        - OTPSettings
      summary: Получить текущую конфигурацию OTP
      description: |
        Возвращает параметры OTP (lifespan и количество символов). 
        Доступно только для пользователей с ролью ADMIN.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущая конфигурация OTP
          # ... ваш контент ...
        '403':
          description: Доступ запрещен (требуется роль ADMIN)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    put:
      x-role-required: ADMIN
      tags:
        - OTPSettings
      summary: Обновить конфигурацию OTP
      description: Обновляет lifespan и number_of_symbols. Доступно только пользователям с ролью ADMIN. Таблица хранит не более одной записи.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpConfigUpdateRequest'
      responses:
        '200':
          description: Обновленная конфигурация OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpConfigResponse'
        '400':
          description: Валидация ошибок
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Регистрация пользователя
      description: Создаёт пользователя с ролью ordinary или admin (если admin ещё нет).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validOrdinary:
                summary: Валидный обычный пользователь
                value:
                  login: "user123"
                  password: "StrongPass123!"
                  role: "ordinary"
              validAdmin:
                summary: Создание админа (если еще не существует)
                value:
                  login: "admin"
                  password: "secretAdminPass"
                  role: "admin"
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Ошибка валидации (слабый пароль или логин занят)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Конфликт (Admin уже существует)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Аутентификация пользователя
      description: Проверяет учетные данные и возвращает JWT-токен.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Неверный логин или пароль
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Выход пользователя
      description: Деактивирует текущий JWT-токен (добавляет в blacklist на стороне сервера).
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Успешный выход (No Content)
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT


  schemas:
    RegisterRequest:
      type: object
      required: [login, password, role]
      properties:
        login:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
          writeOnly: true
          pattern: "^[a-zA-Z0-9!@#$%^&*()]{8,}$"
        role:
          type: string
          enum: ["admin", "ordinary"]

    RegisterResponse:
      type: object
      required: [id, login, role]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        role:
          type: string
          enum: ["admin", "ordinary"]

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: "user123"
        password:
          type: string
          format: password
          example: "StrongPass123!"

    LoginResponse:
      type: object
      required: [token, login]
      properties:
        token:
          type: string
        login:
          type: string
        expiresIn:
          type: integer
          description: Срок действия в секундах
          example: 3600

    OtpConfigResponse:
      type: object
      required:
        - id
        - lifespan
        - numberOfSymbols
      properties:
        id:
          type: integer
          format: int64
        lifespan:
          type: string
          description: ISO-8601 duration (например, PT15M)
          example: "PT15M"
        numberOfSymbols:
          type: integer
          minimum: 4
          description: Количество знаков в OTP
          example: 6

    OtpConfigUpdateRequest:
      type: object
      required:
        - lifespan
        - numberOfSymbols
      properties:
        lifespan:
          type: string
          description: ISO-8601 duration (например, PT15M)
          example: "PT15M"
        numberOfSymbols:
          type: integer
          minimum: 4
          description: Количество знаков в OTP
          example: 6

    ProblemDetail:
      type: object
      required: [status, title]
      properties:
        type:
          type: string
          format: uri
          default: "about:/blank"
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri