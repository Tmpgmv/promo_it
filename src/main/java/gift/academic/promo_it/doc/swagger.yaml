openapi: 3.0.3
info:
  title: Promo-IT Backend
  description: "Spring Boot API для Promo-IT: регистрация пользователей с уникальным ADMIN и JWT аутентификация."
  version: 1.0.0
  contact:
    name: Promo-IT Team
servers:
  - url: http://localhost:8080
    description: Development server
tags:
  - name: Authentication
    description: Операции регистрации и входа

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Регистрация пользователя
      description: Создаёт пользователя с ролью ordinary или admin (если admin ещё нет).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validOrdinary:
                summary: Валидный обычный пользователь
                value:
                  login: "user123"
                  password: "StrongPass123!"
                  role: "ordinary"
              validAdmin:
                summary: Создание админа (если еще не существует)
                value:
                  login: "admin"
                  password: "secretAdminPass"
                  role: "admin"
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Ошибка валидации (слабый пароль или логин занят)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Конфликт (Admin уже существует)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Аутентификация пользователя
      description: Проверяет учетные данные и возвращает JWT-токен.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Неверный логин или пароль
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [login, password, role]
      properties:
        login:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
          writeOnly: true
          pattern: "^[a-zA-Z0-9!@#$%^&*()]{8,}$"
        role:
          type: string
          enum: ["admin", "ordinary"]

    RegisterResponse:
      type: object
      required: [id, login, role]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        role:
          type: string
          enum: ["admin", "ordinary"]

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: "user123"
        password:
          type: string
          format: password
          example: "StrongPass123!"

    LoginResponse:
      type: object
      required: [token, login]
      properties:
        token:
          type: string
        login:
          type: string
        expiresIn:
          type: integer
          description: Срок действия в секундах
          example: 3600

    ProblemDetail:
      type: object
      required: [status, title]
      properties:
        type:
          type: string
          format: uri
          default: "about:/blank"
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri